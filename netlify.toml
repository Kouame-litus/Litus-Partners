[build]
  command   = "node build-index.js && node carrieres/build-postes.js"
  publish   = "."

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/reflexions/articles.json"
  [headers.values]
    Access-Control-Allow-Origin = "*"
