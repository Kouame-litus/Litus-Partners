backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: "fr"

collections:
  - name: "reflexions"
    label: "Réflexions"
    label_singular: "Article"
    folder: "reflexions/articles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    preview_path: "reflexions.html"
    summary: "{{title}} — {{category}} ({{date}})"
    fields:
      - label: "Titre"
        name: "title"
        widget: "string"
        hint: "Titre de l'article (affiché en grand sur la page)"
      - label: "Catégorie"
        name: "category"
        widget: "select"
        options:
          - { label: "Gouvernance", value: "Gouvernance" }
          - { label: "Intelligence artificielle", value: "Intelligence artificielle" }
          - { label: "Transformation numérique", value: "Transformation numérique" }
      - label: "Date de publication"
        name: "date"
        widget: "datetime"
        date_format: "DD MMMM YYYY"
        time_format: false
        format: "YYYY-MM-DD"
      - label: "Image de couverture"
        name: "image"
        widget: "image"
        required: false
        hint: "Image affichée en haut de l'article et dans la liste"
      - label: "Résumé"
        name: "summary"
        widget: "text"
        hint: "Courte description affichée dans la liste des articles (2-3 phrases)"
      - label: "Temps de lecture (minutes)"
        name: "readtime"
        widget: "number"
        default: 5
        value_type: "int"
        min: 1
        max: 60
        required: false
      - label: "Auteur"
        name: "author"
        widget: "string"
        default: "Litus Partners"
        required: false
      - label: "Contenu de l'article"
        name: "body"
        widget: "markdown"
        hint: "Utilisez la barre d'outils pour mettre en forme votre texte"

  - name: "postes"
    label: "Postes"
    label_singular: "Poste"
    folder: "carrieres/postes"
    create: true
    slug: "{{slug}}"
    summary: "{{titre}} — {{lieu}} ({{type_contrat}})"
    fields:
      - label: "Titre du poste"
        name: "titre"
        widget: "string"
        hint: "Ex. : Conseiller en stratégie senior"
      - label: "Lieu"
        name: "lieu"
        widget: "string"
        default: "Québec, Canada"
        hint: "Ex. : Québec, Canada — Télétravail"
      - label: "Type de contrat"
        name: "type_contrat"
        widget: "select"
        options:
          - { label: "Temps plein", value: "Temps plein" }
          - { label: "Temps partiel", value: "Temps partiel" }
          - { label: "Contrat", value: "Contrat" }
          - { label: "Stage", value: "Stage" }
      - label: "Mode de travail"
        name: "mode"
        widget: "select"
        options:
          - { label: "Présentiel", value: "Présentiel" }
          - { label: "Télétravail", value: "Télétravail" }
          - { label: "Hybride", value: "Hybride" }
        default: "Hybride"
      - label: "Date de publication"
        name: "date"
        widget: "datetime"
        date_format: "DD MMMM YYYY"
        time_format: false
        format: "YYYY-MM-DD"
      - label: "Poste actif"
        name: "actif"
        widget: "boolean"
        default: true
        hint: "Décochez pour masquer le poste sans le supprimer"
      - label: "Description du poste"
        name: "body"
        widget: "markdown"
        hint: "Décrivez les responsabilités, le profil recherché et les conditions"
